{% extends 'base.html' %}
{% block title %} Iniciar Sesion - Blog Django {% endblock %}

{% block content %}
<div class = "row justify-content-center">
    <div class = "col-md-5">
        <div class = "card">
            <div class = "card-body">
                <h3 class = "card-title text-center mb-4">Iniciar Sesión</h3>
                    <form method = "POST">
                        {% csrf_token %}
                        <!-- Usuario o Email -->
                        <div class = "mb-3">
                            <label for = "{{form.user.id_label}}" class = "form-label">
                                Usuario o Email
                            </label>
                            {{form.user}}
                        </div>
                        <!-- Password -->
                        <div class = "mb-3">
                            <label for = "{{form.password.id_for_label}}" class="form-label">
                                Contraseña
                            </label>
                            {{form.password}}
                        </div>
                        <!-- Recuerdame-->
                        <div class = "mb-3 form-check">
                            {{form.remember_me}}
                            <label class = "form-check-label" for ="{{form.remember_me.id_for_label}}">
                                {{ form.remember_me.label}}
                            </label>
                        </div>
                        <!-- Submit-->
                        <div class ="d-grip gap-2">
                            <button type="submit" class ="btn
                            btn-primary btn-lg">
                            Inicia Sesion
                            </button>
                        </div>
                    </form>
                <!-- Link Necesarios para enlazara otros templates -->
                <div class = "text-center mt-3">
                    <p class = "text-muted mb-2">
                        ¿No tienes una cuenta?
                        <a href = "{% url 'users:register' %}">
                            Registrese aqui!
                        </a>
                    </p href = "#" class = "text-muted small">
                        ¿Olvidaste tu contraseña?
                    <a>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
